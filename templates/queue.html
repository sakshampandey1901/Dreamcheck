{% extends "base.html" %}
{% block title %}Review Queue{% endblock %}

{% block content %}
<h1>Review queue</h1>
<p class="subtitle">
  Completed generations awaiting a decision.
  <span class="mono" style="color:var(--paper-dim);font-size:0.75rem">A / M / R</span> on a focused card.
</p>

<div id="queue-status" style="display:none"></div>
<div id="queue-container"></div>
{% endblock %}

{% block scripts %}
<script>
let rendered = {};

async function loadQueue() {
  try {
    const res = await fetch('/generations?state=completed&unreviewed=true');
    const items = await res.json();
    const container = document.getElementById('queue-container');

    for (const id of Object.keys(rendered)) {
      if (!items.find(g => g.id === id)) {
        const el = document.getElementById('card-' + id);
        if (el) el.remove();
        delete rendered[id];
      }
    }

    for (const gen of items) {
      if (rendered[gen.id]) continue;
      rendered[gen.id] = true;
      container.insertAdjacentHTML('afterbegin', buildCard(gen));
    }

    const status = document.getElementById('queue-status');
    if (items.length === 0) {
      status.style.display = '';
      status.className = 'empty-state';
      status.innerHTML = `
        <div class="empty-icon mono">— — —</div>
        <p>No completed generations awaiting review.</p>
        <p style="margin-top:0.5rem;font-size:0.875rem">
          <a href="/">Submit a prompt</a> to get started.
        </p>`;
    } else {
      status.style.display = 'none';
    }
  } catch (_) { /* keep polling */ }
}

function buildCard(gen) {
  const asset = gen.asset_url
    ? `<img src="${escHtml(gen.asset_url)}" alt="generated image">`
    : `<img src="/static/placeholder.svg" alt="no asset">`;

  const pattern = gen.prompt_pattern || 'other';

  return `
<div class="card card-strip queue-card" id="card-${gen.id}" data-id="${gen.id}" tabindex="0">
  <div class="verdict-strip verdict-strip--pending"></div>
  <div class="queue-asset">${asset}</div>
  <div class="queue-controls">
    <div>
      <div class="queue-prompt-pattern">${escHtml(pattern)}</div>
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.375rem">
        <span class="state-pill state-pill--${escHtml(gen.model === 'ray-2' ? 'modify' : 'completed')}"
              style="font-size:0.6875rem">${escHtml(gen.model)}</span>
      </div>
      <div class="queue-prompt">${escHtml(gen.prompt)}</div>
    </div>
    <div class="field" style="margin-bottom:0.5rem">
      <label class="field-label" for="note-${gen.id}">
        Note <span class="mono" style="color:var(--paper-dim);font-size:0.7rem">(required for modify / reject)</span>
      </label>
      <textarea id="note-${gen.id}" rows="2"
        placeholder="What works or needs changing…"></textarea>
    </div>
    <div class="queue-buttons">
      <button class="btn btn-accept btn-sm"  onclick="submitReview('${gen.id}','accept')">Accept (A)</button>
      <button class="btn btn-modify btn-sm"  onclick="submitReview('${gen.id}','modify')">Modify (M)</button>
      <button class="btn btn-reject btn-sm"  onclick="submitReview('${gen.id}','reject')">Reject (R)</button>
    </div>
    <div class="tracker-id">id: ${escHtml(gen.id)}</div>
  </div>
</div>`;
}

async function submitReview(id, decision) {
  const note = document.getElementById('note-' + id)?.value.trim() || null;
  if ((decision === 'modify' || decision === 'reject') && !note) {
    flash('A note is required for modify and reject.', 'error');
    return;
  }
  try {
    const res = await fetch(`/generations/${id}/review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decision, note })
    });
    const data = await res.json();
    if (!res.ok) { flash(data.detail || 'Error submitting review.', 'error'); return; }

    flash(`Marked as ${decision}.`, 'success');
    const card = document.getElementById('card-' + id);
    if (card) {
      const strip = card.querySelector('.verdict-strip');
      if (strip) strip.className = `verdict-strip verdict-strip--${decision}`;
      card.style.transition = 'opacity 0.35s';
      card.style.opacity = '0.3';
      setTimeout(() => { card.remove(); delete rendered[id]; }, 380);
    }
  } catch (e) {
    flash('Network error: ' + e.message, 'error');
  }
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  const focused = document.querySelector('.queue-card:focus');
  if (!focused) return;
  const id = focused.dataset.id;
  if (!id) return;
  if (e.key === 'a' || e.key === 'A') { e.preventDefault(); submitReview(id, 'accept'); }
  if (e.key === 'm' || e.key === 'M') { e.preventDefault(); submitReview(id, 'modify'); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); submitReview(id, 'reject'); }
});

loadQueue();
setInterval(loadQueue, 4000);
</script>
{% endblock %}
