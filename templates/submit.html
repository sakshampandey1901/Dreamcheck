{% extends "base.html" %}
{% block title %}Submit{% endblock %}

{% block content %}
<div style="max-width:640px">
  <h1>Submit a generation</h1>
  <div class="ticker-wrap" aria-label="Generation lifecycle">
    <span class="ticker-label mono" style="color:var(--paper-dim)">lifecycle:</span>
    <div class="ticker" aria-hidden="true">
      <span class="ticker-state ticker-state--queued"    style="--i:0">queued</span>
      <span class="ticker-state ticker-state--dreaming"  style="--i:1">dreaming</span>
      <span class="ticker-state ticker-state--completed" style="--i:2">completed</span>
    </div>
  </div>
  <p class="subtitle" style="margin-top:1.25rem">
    Enter a prompt — the mock client transitions states in ~5–15 s.
  </p>

  <div class="card">
    <div class="field">
      <label class="field-label" for="prompt">Prompt</label>
      <textarea id="prompt" rows="3"
        placeholder="cinematic aerial shot of Tokyo at dusk, neon reflections on wet streets…"></textarea>
    </div>
    <div class="field">
      <label class="field-label" for="model">Model</label>
      <select id="model">
        <option value="ray-flash-2">ray-flash-2</option>
        <option value="ray-2">ray-2</option>
      </select>
    </div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitGen()">
      Submit generation
    </button>
  </div>
</div>

<div id="result-area" style="max-width:640px;margin-top:0.5rem"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/ticker.js"></script>
<script>
async function submitGen() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { flash('Prompt cannot be empty.', 'error'); return; }
  const model = document.getElementById('model').value;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  try {
    const res = await fetch('/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model })
    });
    const data = await res.json();
    if (!res.ok) { flash(data.detail || 'Error submitting generation.', 'error'); return; }
    document.getElementById('prompt').value = '';
    flash('Generation submitted.', 'success');
    showTracker(data.id, prompt, model);
  } catch (e) {
    flash('Network error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function showTracker(id, prompt, model) {
  const area = document.getElementById('result-area');
  const card = document.createElement('div');
  card.className = 'card card-strip tracker-card';
  card.id = 'tracker-' + id;
  card.innerHTML = `
    <div class="verdict-strip verdict-strip--dreaming" id="strip-${id}"></div>
    <div class="tracker-header">
      <div style="flex:1;min-width:0">
        <div class="tracker-meta">${escHtml(model)}</div>
        <div class="tracker-prompt">${escHtml(prompt)}</div>
      </div>
      <span class="state-pill state-pill--queued" id="pill-${id}">queued</span>
    </div>
    <div id="asset-${id}" class="tracker-asset" style="display:none"></div>
    <div class="tracker-id mono">id: ${escHtml(id)}</div>
  `;
  area.prepend(card);
  pollTracker(id);
}

async function pollTracker(id) {
  const terminal = new Set(['completed', 'failed']);
  for (;;) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const res = await fetch('/generations');
      const list = await res.json();
      const gen = list.find(g => g.id === id);
      if (!gen) continue;

      const pill = document.getElementById('pill-' + id);
      const strip = document.getElementById('strip-' + id);
      if (pill) { pill.className = `state-pill state-pill--${gen.state}`; pill.textContent = gen.state; }
      if (strip) {
        strip.className = 'verdict-strip ' + (
          gen.state === 'completed' ? 'verdict-strip--accept' :
          gen.state === 'failed'    ? 'verdict-strip--failed' :
                                      'verdict-strip--dreaming'
        );
      }

      if (gen.state === 'completed' && gen.asset_url) {
        const assetDiv = document.getElementById('asset-' + id);
        if (assetDiv && !assetDiv.querySelector('img')) {
          assetDiv.style.display = '';
          assetDiv.innerHTML = `<img src="${escHtml(gen.asset_url)}" alt="generated image">`;
        }
      }
      if (gen.state === 'failed' && gen.failure_reason) {
        const assetDiv = document.getElementById('asset-' + id);
        if (assetDiv) {
          assetDiv.style.display = '';
          assetDiv.innerHTML =
            `<div class="msg msg-error" style="margin:0;border-radius:6px">${escHtml(gen.failure_reason)}</div>`;
        }
      }
      if (terminal.has(gen.state)) break;
    } catch (_) { /* keep polling */ }
  }
}
</script>
{% endblock %}
