<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dreamcheck{% endblock %} — Luma Generation QA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --yellow: #d29922; --red: #f85149;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           font-size: 15px; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav .brand { font-weight: 700; font-size: 17px; color: var(--text); }
    nav a { color: var(--muted); font-size: 14px; }
    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 16px; }

    input, textarea, select {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: inherit;
      width: 100%; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 14px;
      font-family: inherit; cursor: pointer; border: 1px solid transparent;
      font-weight: 500; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-accept  { background: var(--green); color: #0d1117; }
    .btn-modify  { background: var(--yellow); color: #0d1117; }
    .btn-reject  { background: var(--red);   color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .badge-queued   { background: #1f2d3d; color: #58a6ff; }
    .badge-dreaming { background: #2d1f3d; color: #bc8cff; }
    .badge-completed{ background: #1a2d1f; color: #3fb950; }
    .badge-failed   { background: #2d1a1a; color: #f85149; }
    .badge-accept   { background: #1a2d1f; color: #3fb950; }
    .badge-modify   { background: #2d2a1a; color: #d29922; }
    .badge-reject   { background: #2d1a1a; color: #f85149; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; color: var(--muted); font-weight: 500;
         padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }

    .msg { padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
    .msg-info    { background: #1f2d3d; border: 1px solid #2d4a6d; color: #58a6ff; }
    .msg-success { background: #1a2d1f; border: 1px solid #2d5c3d; color: #3fb950; }
    .msg-error   { background: #2d1a1a; border: 1px solid #5c2d2d; color: #f85149; }

    .label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .field { margin-bottom: 14px; }

    .stat-big { font-size: 32px; font-weight: 700; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    #flash { position: fixed; top: 16px; right: 16px; z-index: 999; min-width: 240px; }
  </style>
</head>
<body>
<nav>
  <span class="brand">Dreamcheck</span>
  <a href="/" id="nav-submit">Submit</a>
  <a href="/queue" id="nav-queue">Review Queue</a>
  <a href="/stats" id="nav-stats">Stats</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<div id="flash"></div>
<script>
function flash(msg, type) {
  const el = document.getElementById('flash');
  el.innerHTML = `<div class="msg msg-${type}" style="margin:0">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 3500);
}
// Mark active nav
(function(){
  const p = location.pathname;
  if (p === '/') document.getElementById('nav-submit').classList.add('active');
  if (p === '/queue') document.getElementById('nav-queue').classList.add('active');
  if (p === '/stats') document.getElementById('nav-stats').classList.add('active');
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
