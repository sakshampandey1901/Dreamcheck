<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dreamcheck{% endblock %} — Luma QA</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
<nav>
  <span class="brand">Dreamcheck</span>
  <a href="/"      id="nav-submit">Submit</a>
  <a href="/queue" id="nav-queue">Review</a>
  <a href="/stats" id="nav-stats">Stats</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<footer>
  Dreamcheck &nbsp;·&nbsp; mock-first Luma generation QA &nbsp;·&nbsp;
  <span class="mono" style="color:var(--line)">LUMA_MODE=mock</span>
</footer>
<div id="flash"></div>
<script>
function flash(msg, type) {
  const el = document.getElementById('flash');
  el.innerHTML = `<div class="msg msg-${type}" style="margin:0">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 3500);
}
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
(function(){
  const p = location.pathname;
  if (p === '/')      document.getElementById('nav-submit').classList.add('active');
  if (p === '/queue') document.getElementById('nav-queue').classList.add('active');
  if (p === '/stats') document.getElementById('nav-stats').classList.add('active');
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
